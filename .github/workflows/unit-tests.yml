name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - "agent_code/**"
      - "web/**"
      - "tests/**"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "agent_code/**"
      - "web/**"
      - "tests/**"
      - ".github/workflows/unit-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-unit-tests:
    name: Python unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest PyJWT openpyxl Flask prometheus-client requests

      - name: Run unit tests
        env:
          OPENROUTER_API_KEY: ci-placeholder
          OPENROUTER_MODEL: openai/gpt-4o-mini
        run: python -m pytest tests -q
