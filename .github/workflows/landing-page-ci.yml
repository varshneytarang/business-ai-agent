name: Landing Page CI

on:
  push:
    branches: [main]
    paths:
      - "landing-page/**"
      - ".github/workflows/landing-page-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "landing-page/**"
      - ".github/workflows/landing-page-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: landing-page-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Landing page typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: landing-page

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build landing page
        run: npm run build
