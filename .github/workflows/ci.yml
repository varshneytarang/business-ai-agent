name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent_code/requirements.txt pytest

      - name: Compile backend modules
        run: python -m compileall agent_code

      - name: Run backend tests when present
        run: |
          if [ -d agent_code/tests ]; then
            pytest agent_code/tests -v
          else
            echo "No agent_code/tests directory found; compileall completed successfully."
          fi

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install --upgrade ruff

      - name: Run critical ruff checks
        run: ruff check agent_code --select E9,F63,F7,F82
